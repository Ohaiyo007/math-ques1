<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ภารกิจลับของผู้กล้า</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0d0800 0%,#110d03 50%,#0a0d05 100%);color:#e8d9b0;font-family:'IM Fell English',Georgia,serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.quest-card{max-width:580px;width:100%;border:1px solid #6b4f1a;border-radius:6px;background:rgba(255,255,255,0.025);padding:36px 32px;text-align:center;box-shadow:0 0 60px rgba(139,90,30,0.15);}
.quest-badge{font-family:'Cinzel',Georgia,serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#c09040;margin-bottom:6px;}
.header-title{font-family:'Cinzel',Georgia,serif;font-size:20px;font-weight:700;color:#f0c060;margin-bottom:4px;text-shadow:0 0 20px rgba(240,192,96,0.3);}
.header-sub{font-size:13px;color:#c09040;font-style:italic;margin-bottom:20px;letter-spacing:1px;}
.quest-num{font-family:'Cinzel',Georgia,serif;font-size:32px;font-weight:700;color:#f0c060;margin-bottom:16px;text-shadow:0 0 20px rgba(240,192,96,0.3);}
.divider{height:1px;background:linear-gradient(90deg,transparent,#6b4f1a,transparent);margin:16px 0;}
.quest-text{font-size:19px;line-height:1.9;color:#e8d9b0;margin-bottom:28px;text-align:left;}
.reveal-btn{font-family:'Cinzel',Georgia,serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,#8b5e10,#c09040);color:#0d0a06;border:none;border-radius:3px;padding:14px 32px;cursor:pointer;transition:filter .2s;width:100%;}
.reveal-btn:hover{filter:brightness(1.2);}
.answer-box{margin-top:20px;padding:20px 24px;border:1px solid #2a4a2a;border-radius:4px;background:rgba(0,80,0,0.1);animation:fadeIn .4s ease;display:none;text-align:left;}
.answer-box.show{display:block;}
.answer-label{font-family:'Cinzel',Georgia,serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4a8a4a;margin-bottom:10px;text-align:center;}
.answer-text{font-size:17px;line-height:1.9;color:#90c890;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stamp{font-size:11px;color:#4a3a1a;margin-top:24px;font-style:italic;}
.not-found{font-family:'Cinzel',Georgia,serif;font-size:18px;color:#c09040;text-align:center;padding:40px;}
</style>
</head>
<body>
<script>
const quests = [
  {n:1, q:"ใบบัวมีเงิน 50 บาท แม่ให้อีก 20 บาท ซื้อสมุดไป 35 บาท ใบบัวเหลือเงินกี่บาท?", a:"เหลือเงิน 35 บาท\n\nวิธีคิด: ขั้นแรกนำเงินที่มีมารวมกับที่แม่ให้ 50 + 20 = 70 บาท จากนั้นหักค่าสมุดออก 70 − 35 = 35 บาท"},
  {n:2, q:"ร้านค้ามีไอศกรีม 65 แท่ง ทำเพิ่มอีก 15 แท่ง ขายไปได้ 40 แท่ง เหลือไอศกรีมกี่แท่ง?", a:"เหลือไอศกรีม 40 แท่ง\n\nวิธีคิด: รวมไอศกรีมทั้งหมดก่อน 65 + 15 = 80 แท่ง แล้วลบที่ขายได้ออกไป 80 − 40 = 40 แท่ง"},
  {n:3, q:"ในสวนมีนกเกาะอยู่ 18 ตัว บินมาเพิ่มอีก 12 ตัว บินหนีไป 7 ตัว เหลือนกกี่ตัว?", a:"เหลือนก 23 ตัว\n\nวิธีคิด: นกรวมกันตอนแรกได้ 18 + 12 = 30 ตัว เมื่อบินหนีไปจึงลบออก 30 − 7 = 23 ตัว"},
  {n:4, q:"มีลูกโป่งสีฟ้า 40 ลูก สีชมพู 30 ลูก ทำแตกไป 15 ลูก เหลือลูกโป่งกี่ลูก?", a:"เหลือลูกโป่ง 55 ลูก\n\nวิธีคิด: นับลูกโป่งสองสีรวมกัน 40 + 30 = 70 ลูก แตกไปคือหักออก 70 − 15 = 55 ลูก"},
  {n:5, q:"พ่อเลี้ยงปลาไว้ 80 ตัว ตักแจกเพื่อนไป 25 ตัว ซื้อมาเลี้ยงเพิ่มอีก 10 ตัว ตอนนี้มีปลากี่ตัว?", a:"ตอนนี้มีปลา 65 ตัว\n\nวิธีคิด: แจกเพื่อนไปต้องลบออกก่อน 80 − 25 = 55 ตัว แล้วบวกปลาที่ซื้อมาเพิ่ม 55 + 10 = 65 ตัว"},
  {n:6, q:"แม่ซื้อขนม 3 ถุง ถุงละ 5 ชิ้น และซื้อเพิ่มอีก 10 ชิ้น แม่มีขนมทั้งหมดกี่ชิ้น?", a:"มีขนมทั้งหมด 25 ชิ้น\n\nวิธีคิด: หาจำนวนขนมในถุงก่อนโดยการคูณ 3 × 5 = 15 ชิ้น นำไปบวกกับที่ซื้อเพิ่มอีกจะได้ 15 + 10 = 25 ชิ้น"},
  {n:7, q:"ต้นกล้าออมเงินวันละ 10 บาท เป็นเวลา 5 วัน นำเงินไปซื้อของเล่น 30 บาท เหลือเงินกี่บาท?", a:"เหลือเงิน 20 บาท\n\nวิธีคิด: หาเงินออมทั้งหมด 10 × 5 = 50 บาท นำไปลบค่าของเล่นออก 50 − 30 = 20 บาท"},
  {n:8, q:"ขุนมีดินสอ 8 แท่ง ซื้อมาเพิ่มอีก 2 กล่อง กล่องละ 5 แท่ง รวมแล้วขุนมีดินสอกี่แท่ง?", a:"รวมมีดินสอ 18 แท่ง\n\nวิธีคิด: หาจำนวนดินสอที่ซื้อเพิ่มใหม่ก่อน 2 × 5 = 10 แท่ง นำไปบวกกับดินสอเดิมที่มีอยู่ 8 + 10 = 18 แท่ง"},
  {n:9, q:"มีดินสอสี 5 กล่อง กล่องละ 8 แท่ง มีดินสอสีนอกกล่องอีก 3 แท่ง รวมมีดินสอสีทั้งหมดกี่แท่ง?", a:"รวมมีดินสอสี 43 แท่ง\n\nวิธีคิด: หาจำนวนดินสอในกล่อง 5 × 8 = 40 แท่ง นำไปบวกเพิ่มกับดินสอนอกกล่อง 40 + 3 = 43 แท่ง"},
  {n:10, q:"จัดดอกไม้ 3 แจกัน แจกันละ 9 ดอก ต่อมาเหี่ยวเฉาไป 5 ดอก เหลือดอกไม้ที่ยังดีอยู่กี่ดอก?", a:"เหลือดอกไม้ 22 ดอก\n\nวิธีคิด: หาดอกไม้ที่จัดทั้งหมด 3 × 9 = 27 ดอก หักดอกที่เหี่ยวทิ้งไป 27 − 5 = 22 ดอก"},
  {n:11, q:"นมราคากล่องละ 12 บาท ซื้อ 2 กล่อง และซื้อขนมปังเพิ่มอีก 15 บาท ต้องจ่ายเงินทั้งหมดกี่บาท?", a:"ต้องจ่ายเงินทั้งหมด 39 บาท\n\nวิธีคิด: คำนวณค่านมก่อน 12 × 2 = 24 บาท นำไปบวกรวมกับค่าขนมปัง 24 + 15 = 39 บาท"},
  {n:12, q:"เกษตรกรปลูกมะเขือเทศ 5 แถว แถวละ 10 ต้น ถอนทิ้งเพราะแมลงกิน 8 ต้น เหลือมะเขือเทศกี่ต้น?", a:"เหลือมะเขือเทศ 42 ต้น\n\nวิธีคิด: หามะเขือเทศที่ปลูกทั้งหมด 5 × 10 = 50 ต้น ลบต้นที่แมลงกินออกไป 50 − 8 = 42 ต้น"},
  {n:13, q:"มีส้ม 20 ผล แบ่งให้เด็ก 4 คน คนละเท่า ๆ กัน แม่ให้อีกคนละ 3 ผล เด็กแต่ละคนจะได้ส้มกี่ผล?", a:"จะได้ส้มคนละ 8 ผล\n\nวิธีคิด: แบ่งส้มรอบแรกได้คนละ 20 ÷ 4 = 5 ผล นำไปบวกกับที่แม่ให้อีกคนละ 3 ผล เป็น 5 + 3 = 8 ผล"},
  {n:14, q:"มีน้ำดื่ม 30 ขวด แบ่งใส่ลัง ลังละ 5 ขวด นำไปบริจาค 4 ลัง เหลืออยู่กี่ลัง?", a:"เหลืออยู่ 2 ลัง\n\nวิธีคิด: หาลังน้ำดื่มทั้งหมดก่อน 30 ÷ 5 = 6 ลัง นำไปลบลังที่บริจาคออก 6 − 4 = 2 ลัง"},
  {n:15, q:"มีคัพเค้ก 24 ชิ้น แบ่งใส่กล่อง กล่องละ 4 ชิ้น มีคนเอามาให้อีก 10 กล่อง รวมมีกี่กล่อง?", a:"รวมมีทั้งหมด 16 กล่อง\n\nวิธีคิด: หาคัพเค้กที่แบ่งใส่กล่องได้ 24 ÷ 4 = 6 กล่อง รวมกับที่มีคนให้อีก 6 + 10 = 16 กล่อง"},
  {n:16, q:"มีเงิน 45 บาท แบ่งให้ลูก 5 คน คนละเท่า ๆ กัน ลูกคนโตนำเงินไปซื้อขนม 5 บาท จะเหลือเงินกี่บาท?", a:"ลูกคนโตจะเหลือเงิน 4 บาท\n\nวิธีคิด: ลูกแต่ละคนได้เงินแบ่งเท่ากัน 45 ÷ 5 = 9 บาท ลูกคนโตใช้ไป 5 บาท จึงเหลือ 9 − 5 = 4 บาท"},
  {n:17, q:"มีโดนัท 18 ชิ้น แบ่งให้เด็ก 3 คน คนละเท่า ๆ กัน พ่อให้อีกคนละ 2 ชิ้น เด็กแต่ละคนจะมีโดนัทกี่ชิ้น?", a:"เด็กจะได้โดนัทคนละ 8 ชิ้น\n\nวิธีคิด: แบ่งโดนัทตอนแรกได้คนละ 18 ÷ 3 = 6 ชิ้น พ่อเพิ่มให้อีกคนละ 2 ชิ้น รวมเป็น 6 + 2 = 8 ชิ้น"},
  {n:18, q:"แก้วตาขอเงินแม่ 100 บาท ซื้อไม้บรรทัด 20 บาท เงินที่เหลือแบ่งให้ลูก 2 คนเท่า ๆ กัน จะได้คนละกี่บาท?", a:"จะได้คนละ 40 บาท\n\nวิธีคิด: หาเงินที่เหลือก่อน 100 − 20 = 80 บาท จากนั้นนำมาหารแบ่งให้ลูก 2 คน 80 ÷ 2 = 40 บาท"},
  {n:19, q:"เชือกยาว 50 เมตร ตัดไปใช้ 10 เมตร ส่วนที่เหลือนำมาตัดแบ่งเส้นละ 5 เมตร จะได้กี่เส้น?", a:"จะได้เชือกทั้งหมด 8 เส้น\n\nวิธีคิด: หาความยาวเชือกที่เหลือก่อน 50 − 10 = 40 เมตร นำมาหารแบ่งเส้นละ 5 เมตร ได้ 40 ÷ 5 = 8 เส้น"},
  {n:20, q:"คุณยายทำขนมกล้วย 45 ห่อ เน่าเสียต้องทิ้ง 5 ห่อ ที่เหลือแจกเพื่อนบ้าน 8 คน คนละเท่า ๆ กัน จะได้คนละกี่ห่อ?", a:"เพื่อนบ้านจะได้คนละ 5 ห่อ\n\nวิธีคิด: หาขนมที่ดีอยู่ 45 − 5 = 40 ห่อ นำมาหารแบ่งให้เพื่อนบ้าน 8 คน ได้คนละ 40 ÷ 8 = 5 ห่อ"},
  {n:21, q:"ตะวันมีสมุด 60 เล่ม บริจาคไป 25 เล่ม ซื้อมาเพิ่มอีก 15 เล่ม รวมมีสมุดกี่เล่ม?", a:"รวมมีสมุด 50 เล่ม\n\nวิธีคิด: ลบสมุดที่บริจาคออกไปก่อน 60 − 25 = 35 เล่ม แล้วบวกเพิ่มสมุดที่ซื้อมาใหม่ 35 + 15 = 50 เล่ม"},
  {n:22, q:"ฟ้าออมเงินวันแรก 45 บาท วันที่สอง 35 บาท นำเงินทั้งหมดไปซื้อขนม 20 บาท เหลือเงินกี่บาท?", a:"เหลือเงิน 60 บาท\n\nวิธีคิด: รวมเงินออมทั้งสองวัน 45 + 35 = 80 บาท นำไปลบค่าขนมออก 80 − 20 = 60 บาท"},
  {n:23, q:"ซื้อไอศกรีม 4 แท่ง แท่งละ 10 บาท และซื้อน้ำดื่มอีก 15 บาท ต้องจ่ายเงินทั้งหมดกี่บาท?", a:"ต้องจ่ายเงิน 55 บาท\n\nวิธีคิด: คำนวณราคาไอศกรีมก่อน 4 × 10 = 40 บาท นำมารวมกับค่าน้ำดื่ม 40 + 15 = 55 บาท"},
  {n:24, q:"ห้องเรียนจัดเก้าอี้ไว้ 6 แถว แถวละ 5 ตัว มีนักเรียนนั่งไปแล้ว 12 ตัว เหลือเก้าอี้ว่างกี่ตัว?", a:"เหลือเก้าอี้ว่าง 18 ตัว\n\nวิธีคิด: หาเก้าอี้ทั้งหมดในห้อง 6 × 5 = 30 ตัว หักเก้าอี้ที่มีคนนั่งออกไป 30 − 12 = 18 ตัว"},
  {n:25, q:"คุณครูแจกเงินให้พี่ 30 บาท และแจกให้น้อง 3 คน คนละ 10 บาท คุณครูแจกเงินไปทั้งหมดกี่บาท?", a:"แจกเงินไปทั้งหมด 60 บาท\n\nวิธีคิด: หาเงินที่แจกให้น้อง ๆ ก่อน 3 × 10 = 30 บาท นำมารวมกับเงินที่แจกให้พี่ 30 + 30 = 60 บาท"},
  {n:26, q:"มีคุกกี้ 35 ชิ้น แบ่งใส่ถุง ถุงละ 5 ชิ้น ต่อมามีคนให้อีก 6 ถุง รวมตอนนี้มีคุกกี้กี่ถุง?", a:"รวมมีคุกกี้ 13 ถุง\n\nวิธีคิด: หาจำนวนถุงคุกกี้ที่แบ่งได้รอบแรก 35 ÷ 5 = 7 ถุง นำไปบวกเพิ่มกับถุงที่มีคนให้อีก 7 + 6 = 13 ถุง"},
  {n:27, q:"มีตัวต่อ 40 ชิ้น แบ่งให้เด็ก 5 คน คนละเท่า ๆ กัน เด็กคนหนึ่งทำหายไป 2 ชิ้น เขาจะเหลือตัวต่อกี่ชิ้น?", a:"จะเหลือตัวต่อ 6 ชิ้น\n\nวิธีคิด: หาตัวต่อที่เด็กแต่ละคนได้รับ 40 ÷ 5 = 8 ชิ้น หักชิ้นที่ทำหายออกไป 8 − 2 = 6 ชิ้น"},
  {n:28, q:"พลอยมีสติกเกอร์ 50 แผ่น แปะสมุดไปแล้ว 14 แผ่น ที่เหลือนำไปแบ่งให้เพื่อน 4 คนเท่า ๆ กัน เพื่อนจะได้คนละกี่แผ่น?", a:"เพื่อนจะได้คนละ 9 แผ่น\n\nวิธีคิด: หาสติกเกอร์ที่เหลือก่อน 50 − 14 = 36 แผ่น แล้วนำมาหารแบ่งให้เพื่อน 4 คน 36 ÷ 4 = 9 แผ่น"},
  {n:29, q:"พ่อมีเสื้อสีขาว 12 ตัว สีฟ้า 18 ตัว นำเสื้อทั้งหมดมาจัดใส่กล่อง กล่องละ 5 ตัว จะจัดได้กี่กล่อง?", a:"จะจัดได้ทั้งหมด 6 กล่อง\n\nวิธีคิด: รวมจำนวนเสื้อทั้งสองสีก่อน 12 + 18 = 30 ตัว จากนั้นนำมาหารเฉลี่ยใส่กล่องละ 5 ตัวได้ 30 ÷ 5 = 6 กล่อง"},
  {n:30, q:"ในตะกร้าใบแรกมีฝรั่ง 15 ผล ตะกร้าใบที่สองมีส้มอยู่ 3 ถุง ถุงละ 5 ผล รวมมีผลไม้ทั้งหมดกี่ผล?", a:"รวมมีผลไม้ทั้งหมด 30 ผล\n\nวิธีคิด: หาจำนวนส้มในตะกร้าใบที่สองก่อน 3 × 5 = 15 ผล นำมารวมกับฝรั่งในตะกร้าใบแรก 15 + 15 = 30 ผล"}
];

function render() {
  const params = new URLSearchParams(location.search);
  const n = parseInt(params.get('n'));
  if (!n || n < 1 || n > quests.length) {
    document.body.innerHTML = '<div class="not-found">⚔️<br><br>ไม่พบภารกิจนี้<br><br>กรุณาสแกน QR ใหม่อีกครั้ง</div>';
    return;
  }
  const quest = quests[n - 1];
  document.body.innerHTML = `
    <div class="quest-card">
      <div class="quest-badge">⚔️ ภารกิจลับของผู้กล้า</div>
      <div class="header-title">ภารกิจลับของผู้กล้า</div>
      <div class="header-sub">Math Quest : ภารกิจพิชิตโจทย์ระคน</div>
      <div class="quest-num">ภารกิจที่ ${quest.n}</div>
      <div class="divider"></div>
      <div class="quest-text">${quest.q.replace(/\n/g,'<br>')}</div>
      <button class="reveal-btn" onclick="document.getElementById('ans').classList.add('show');this.style.display='none'">🗝️ เปิดเผยเฉลย</button>
      <div class="answer-box" id="ans">
        <div class="answer-label">✦ เฉลย ✦</div>
        <div class="answer-text">${quest.a.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="stamp">สแกนการ์ดใบถัดไปเพื่อรับภารกิจต่อไป</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
